<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>India Mining Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; height: 100vh; background: #000; }
        #map { height: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.vectorgrid@1.3.0/dist/Leaflet.VectorGrid.bundled.js"></script>
    <script src="https://unpkg.com/@mapbox/leaflet-omnivore@0.3.4/leaflet-omnivore.min.js"></script>

    <script>
        const map = L.map('map', {
            maxZoom: 22
        }).setView([21.25, 81.85], 8);

        // Base layer
        const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 22,
            maxNativeZoom: 19,
            attribution: 'Esri'
        }).addTo(map);

        // Major mining leases
        const majorMining = L.vectorGrid.protobuf(
            "https://indianopenmaps.fly.dev/not-so-open/mining/leases/major/ncog/{z}/{x}/{y}.pbf",
            {
                maxNativeZoom: 10,
                maxZoom: 22,
                rendererFactory: L.svg.tile,
                vectorTileLayerStyles: {
                    'NCOG_Major_Mining_Leases': {
                        fillColor: '#ffa500',
                        fill: true,
                        fillOpacity: 0.3,
                        stroke: true,
                        color: '#ffa500',
                        weight: 0.1
                    }
                },
                interactive: true,
                getFeatureId: function(feature) {
                    return feature.properties?.id || feature.properties?.lease_id || Math.random();
                }
            }
        ).addTo(map);

        // Minor mining leases
        const minorMining = L.vectorGrid.protobuf(
            "https://indianopenmaps.fly.dev/not-so-open/mining/leases/minor/ncog/{z}/{x}/{y}.pbf",
            {
                maxNativeZoom: 10,
                maxZoom: 22,
                rendererFactory: L.svg.tile,
                vectorTileLayerStyles: {
                    'NCOG_Minor_Mining_Leases': {
                        fillColor: '#0000ff',
                        fill: true,
                        fillOpacity: 0.3,
                        stroke: true,
                        color: '#0000ff',
                        weight: 0.1
                    }
                },
                interactive: true,
                getFeatureId: function(feature) {
                    return feature.properties?.id || feature.properties?.lease_id || Math.random();
                }
            }
        ).addTo(map);

        // KML style + layer
        const kmlStyle = {
            color: 'white',
            weight: 2,
            fillColor: 'white',
            fillOpacity: 0.05
        };

        const kmlLayer = omnivore.kml('data/Dep4MLArea.kml', null, L.geoJson(null, {
            style: function () { return kmlStyle; },
            onEachFeature: function (feature, layer) {
                const p = feature.properties || {};

                const html = `
                    <div class="popup-content">
                        <strong>${p.Facility || 'Dep-04 ML Area'}</strong><br>
                        Compartment: ${p.Compartmen || 'N/A'}<br>
                        Old Compartment: ${p.Old_Compar || 'N/A'}<br>
                        Area: ${p.Area_1 || 'N/A'} ha<br>
                        Forest Type: ${p.ForestType || 'N/A'}<br>
                        Division: ${p.Division || 'N/A'}<br>
                        Range: ${p.Range || 'N/A'}<br>
                        RF: ${p.RF || 'N/A'}
                    </div>
                `;

                layer.bindPopup(html);
            }
        }));


        kmlLayer.addTo(map);

        // WMS layers
        const cgDistrictsWMS = L.tileLayer.wms('https://cfr.atree.org/geoserver/cfr/wms', {
            layers: 'cfr:cg_district_en',
            format: 'image/png',
            transparent: true,
            version: '1.3.0',
            opacity: 0.6
        }).addTo(map);

        const cgVillagesWMS = L.tileLayer.wms('https://cfr.atree.org/geoserver/cfr/wms', {
            layers: 'cfr:cg_village_en',
            format: 'image/png',
            transparent: true,
            version: '1.3.0',
            opacity: 0.6
        });

        const forestCompartments = L.tileLayer.wms('https://cfr.atree.org/geoserver/cfr/wms', {
            layers: 'cfr:cg_forest_compartments',
            format: 'image/png',
            transparent: true,
            version: '1.3.0',
            CRS: 'EPSG:4326',
            opacity: 0.6
        });

        // Major mining popup
        majorMining.on('click', function(e) {
            const props = e.layer?.properties || e.propagatedFrom?.properties || {};
            L.popup({ closeButton: true, className: 'popup-content' })
                .setLatLng(e.latlng)
                .setContent(`
                    <div class="popup-content">
                        <strong>${props.mine_name || props.name || 'Major Mine'}</strong><br>
                        Mine Code: ${props.mine_code || 'N/A'}<br>
                        Lessor: ${props.name_of_le || 'N/A'}<br>
                        Area: ${props.area || 'N/A'} Ha<br>
                        Village: ${props.vil_name11 || 'N/A'}<br>
                        District: ${props.district || 'N/A'}<br>
                        GID: ${props.gid || 'N/A'}
                    </div>
                `)
                .openOn(map);
        });

        // Minor mining popup
        minorMining.on('click', function(e) {
            const props = e.layer?.properties || e.propagatedFrom?.properties || {};
            L.popup({ closeButton: true, className: 'popup-content' })
                .setLatLng(e.latlng)
                .setContent(`
                    <div class="popup-content">
                        <strong>${props.mine_name || props.name || 'Minor Mine'}</strong><br>
                        Mine Code: ${props.mine_code || 'N/A'}<br>
                        Survey No.: ${props.survey_no || 'N/A'}<br>
                        GID: ${props.gid || 'N/A'}
                    </div>
                `)
                .openOn(map);
        });

        // === FIX 1: keep reference to layersControl ===
        const layersControl = L.control.layers(
            { "ESRI Satellite": satellite },
            {
                "Major Mining (Orange)": majorMining,
                "Minor Mining (Blue)": minorMining,
                "Deposit 4": kmlLayer,
                "Districts (Black)": cgDistrictsWMS,
                "Villages (Red)": cgVillagesWMS,
                "Forest Cmpts (Green)": forestCompartments
            },
            { collapsed: false }
        ).addTo(map);

        // Add zoom button next to "Deposit 4"
        map.whenReady(() => {
            const overlayContainer = layersControl._overlaysList || layersControl._container;
            const labels = overlayContainer.getElementsByTagName('label');

            for (let i = 0; i < labels.length; i++) {
                const label = labels[i];

                // === FIX 2: match legend text "Deposit 4" ===
                if (label.textContent.trim().includes('Deposit 4')) {

                    const btn = document.createElement('button');
                    btn.textContent = '⤢';  // or 'Zoom'
                    btn.title = 'Take Me There';
                    btn.style.marginLeft = '6px';
                    btn.style.fontSize = '11px';
                    btn.style.cursor = 'pointer';

                    L.DomEvent.disableClickPropagation(btn);

                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (kmlLayer && kmlLayer.getBounds) {
                            map.fitBounds(kmlLayer.getBounds(), { padding: [20, 20] });
                        }
                    });

                    label.appendChild(btn);
                    break;
                }
            }
        });
    </script>
</body>
</html>
