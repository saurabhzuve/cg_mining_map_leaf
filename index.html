<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CG Mining Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-search@2.9.7/dist/leaflet-search.min.css" />
    <style>
        /*
            Palette:
            #FEFBE3  — lightest cream     → page bg, popup bg, zoom btn bg
            #EFE3C3  — warm parchment     → legend panel bg, map title bg
            #EAEECD  — sage mist          → legend header bg, coords bar bg
            #CFD8B3  — muted sage green   → borders, dividers, scale bar
            #CD9C69  — warm terracotta    → accent: titles, zoom btn, scale top
        */

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            height: 100vh;
            background: #EAEECD;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        #map {
            height: 100vh;
            width: 100%;
        }

        /* ── Map UI overrides ── */
        .leaflet-control-zoom {
            border: none !important;
            box-shadow: 0 2px 10px rgba(130, 100, 60, 0.18) !important;
        }

        .leaflet-control-zoom a {
            background: #FEFBE3 !important;
            color: #7a5530 !important;
            border: none !important;
            font-size: 16px !important;
            line-height: 28px !important;
            width: 28px !important;
            height: 28px !important;
            transition: background 0.15s;
        }

        .leaflet-control-zoom a:hover {
            background: #EFE3C3 !important;
        }

        .leaflet-control-attribution {
            background: rgba(254, 251, 227, 0.88) !important;
            color: #9a845a !important;
            font-size: 10px !important;
            backdrop-filter: blur(4px);
        }

        .leaflet-control-attribution a {
            color: #CD9C69 !important;
        }

        .leaflet-popup-content-wrapper {
            background: #FEFBE3;
            color: #4a3520;
            border-radius: 10px;
            border: 1px solid #CFD8B3;
            box-shadow: 0 6px 24px rgba(130, 100, 60, 0.14);
            padding: 0;
        }

        .leaflet-popup-tip {
            background: #FEFBE3;
        }

        .leaflet-popup-content {
            margin: 0;
        }

        .leaflet-popup-close-button {
            color: #b09c78 !important;
            font-size: 18px !important;
            top: 8px !important;
            right: 10px !important;
        }

        .leaflet-popup-close-button:hover {
            color: #CD9C69 !important;
        }

        /* ── Popup ── */
        .popup-inner {
            padding: 14px 16px;
            min-width: 200px;
        }

        .popup-inner .popup-title {
            font-size: 13px;
            font-weight: 600;
            color: #5c3d18;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid #CFD8B3;
        }

        .popup-inner table {
            width: 100%;
            border-collapse: collapse;
        }

        .popup-inner td {
            font-size: 11.5px;
            padding: 3px 0;
            vertical-align: top;
        }

        .popup-inner td:first-child {
            color: #a08a60;
            padding-right: 12px;
            white-space: nowrap;
            width: 40%;
        }

        .popup-inner td:last-child {
            color: #4a3520;
        }

        /* ── Legend Panel ── */
        #legend {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 1000;
            background: #FEFBE3;
            border: 1px solid #CFD8B3;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(130, 100, 60, 0.14);
            width: 230px;
            overflow: hidden;
        }

        #legend-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 11px 14px;
            cursor: pointer;
            background: #EAEECD;
            border-bottom: 1px solid #CFD8B3;
            user-select: none;
        }

        #legend-header:hover {
            background: #CFD8B3;
        }

        #legend-header .legend-title {
            font-size: 12px;
            font-weight: 600;
            color: #5c3d18;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        #legend-header .legend-toggle {
            font-size: 10px;
            color: #a08a60;
            transition: transform 0.2s;
        }

        #legend-header.collapsed .legend-toggle {
            transform: rotate(-90deg);
        }

        #legend-body {
            padding: 4px 0 8px;
        }

        /* Groups */
        .legend-group {
            margin-bottom: 2px;
        }

        .legend-group-header {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px 5px;
            cursor: pointer;
            user-select: none;
            transition: background 0.1s;
        }

        .legend-group-header:hover {
            background: rgba(207, 216, 179, 0.4);
        }

        .legend-group-header .group-chevron {
            font-size: 9px;
            color: #b09c78;
            width: 10px;
            text-align: center;
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        .legend-group-header.collapsed .group-chevron {
            transform: rotate(-90deg);
        }

        .legend-group-header .group-label {
            font-size: 10.5px;
            font-weight: 600;
            color: #8a7050;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            flex: 1;
        }

        .legend-group-items {
            padding: 2px 0;
        }

        /* Items */
        .legend-item {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 5px 14px 5px 30px;
            cursor: pointer;
            transition: background 0.1s;
            border-radius: 0;
        }

        .legend-item:hover {
            background: rgba(207, 216, 179, 0.35);
        }

        .legend-item.inactive {
            opacity: 0.35;
        }

        .legend-swatch {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            flex-shrink: 0;
            border: 1px solid rgba(0, 0, 0, 0.12);
        }

        .legend-swatch.line {
            height: 3px;
            border-radius: 2px;
            margin: 6px 0;
            border: none;
        }

        .legend-item-label {
            font-size: 11.5px;
            color: #4a3520;
            flex: 1;
            line-height: 1.3;
        }

        .legend-item-extra {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Zoom btn */
        .zoom-btn {
            font-size: 9.5px;
            font-weight: 600;
            color: #7a5530;
            background: rgba(205, 156, 105, 0.18);
            border: 1px solid rgba(205, 156, 105, 0.45);
            border-radius: 4px;
            padding: 2px 6px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            white-space: nowrap;
            letter-spacing: 0.02em;
        }

        .zoom-btn:hover {
            background: rgba(205, 156, 105, 0.35);
            color: #5c3d18;
        }

        /* Divider */
        .legend-divider {
            height: 1px;
            background: #CFD8B3;
            margin: 4px 14px;
        }

        /* Scale bar */
        .leaflet-control-scale-line {
            background: rgba(254, 251, 227, 0.88) !important;
            border: 1px solid #CFD8B3 !important;
            border-top: 2px solid #CD9C69 !important;
            color: #7a5530 !important;
            font-size: 10px !important;
            padding: 2px 5px !important;
        }

        /* Coordinates bar */
        #coords-bar {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(234, 238, 205, 0.92);
            border: 1px solid #CFD8B3;
            border-radius: 6px;
            padding: 4px 12px;
            font-size: 11px;
            color: #9a845a;
            pointer-events: none;
            backdrop-filter: blur(4px);
            font-family: 'SF Mono', 'Consolas', monospace;
            letter-spacing: 0.03em;
        }

        #coords-bar span {
            color: #5c3d18;
        }

        /* Map title */
        #map-title {
            position: absolute;
            top: 12px;
            left: 52px;
            /* z-index: 1000; */
            background: rgba(239, 227, 195, 0.95);
            border: 1px solid #CFD8B3;
            border-radius: 8px;
            padding: 10px 14px ;
            backdrop-filter: blur(6px);
            pointer-events: none;
            opacity: 0.50;
        }

        #map-title h1 {
            font-size: 14px;
            font-weight: 700;
            color: #5c3d18;
            letter-spacing: 0.02em;
            margin-bottom: 2px;
        }

        #map-title p {
            font-size: 10.5px;
            color: #9a845a;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
    </style>
</head>

<body>
    <div id="map"></div>

    <!-- Map Title -->
    <div id="map-title">
        <h1>CG Mining Map</h1>
        <p>Chhattisgarh · Mining Leases</p>
    </div>

    <!-- Custom Legend -->
    <div id="legend">
        <div id="legend-header">
            <span class="legend-title">Layers</span>
            <span class="legend-toggle">▼</span>
        </div>
        <div id="legend-body">

            <!-- Group: Mining Leases -->
            <div class="legend-group" id="grp-mining">
                <div class="legend-group-header" onclick="toggleGroup('grp-mining')">
                    <span class="group-chevron">▼</span>
                    <span class="group-label">Mining Leases (NCOG Data)</span>
                </div>
                <div class="legend-group-items">
                    <div class="legend-item" id="item-major" onclick="toggleLayer('major')">
                        <div class="legend-swatch"
                            style="background:rgba(255,165,0,0.5); border-color:rgba(255,165,0,0.6);"></div>
                        <span class="legend-item-label">Major Mining</span>
                    </div>
                    <div class="legend-item" id="item-minor" onclick="toggleLayer('minor')">
                        <div class="legend-swatch"
                            style="background:rgba(0,0,255,0.4); border-color:rgba(80,80,255,0.6);"></div>
                        <span class="legend-item-label">Minor Mining</span>
                    </div>
                </div>
            </div>

            <div class="legend-divider"></div>

            <!-- Group: Deposit 4 -->
            <div class="legend-group" id="grp-dep4">
                <div class="legend-group-header" onclick="toggleGroup('grp-dep4')">
                    <span class="group-chevron">▼</span>
                    <span class="group-label">Deposit 4</span>
                </div>
                <div class="legend-group-items">
                    <div class="legend-item" id="item-dep4" onclick="toggleLayer('dep4')">
                        <div class="legend-swatch"
                            style="background:rgba(255,255,255,0.12); border-color:rgba(255,255,255,0.4);"></div>
                        <span class="legend-item-label">Dep-04 ML Area</span>
                        <div class="legend-item-extra">
                            <button class="zoom-btn" onclick="zoomToDep4(event)">⊕ Zoom</button>
                        </div>
                    </div>
                    <div class="legend-item" id="item-dep4c" onclick="toggleLayer('dep4c')">
                        <div class="legend-swatch"
                            style="background:rgba(255,255,255,0.08); border-color:rgba(255,255,255,0.35);"></div>
                        <span class="legend-item-label">Compartments</span>
                    </div>
                </div>
            </div>

            <div class="legend-divider"></div>

            <!-- Group: Administrative -->
            <div class="legend-group" id="grp-admin">
                <div class="legend-group-header" onclick="toggleGroup('grp-admin')">
                    <span class="group-chevron">▼</span>
                    <span class="group-label">Administrative</span>
                </div>
                <div class="legend-group-items">
                    <div class="legend-item" id="item-dist" onclick="toggleLayer('dist')">
                        <div class="legend-swatch line" style="background:#888; width:14px; height:2px;"></div>
                        <span class="legend-item-label">Districts</span>
                    </div>
                    <div class="legend-item inactive" id="item-vil" onclick="toggleLayer('vil')">
                        <div class="legend-swatch line" style="background:#e55; width:14px; height:2px;"></div>
                        <span class="legend-item-label">Villages (WMS)</span>
                    </div>
                    <div class="legend-item inactive" id="item-bhuvan" onclick="toggleLayer('bhuvan')">
                        <div class="legend-swatch"
                            style="background:rgba(255,255,0,0.35); border-color:rgba(255,255,0,0.5);"></div>
                        <span class="legend-item-label">Villages (Bhuvan)</span>
                    </div>
                </div>
            </div>

            <div class="legend-divider"></div>

            <!-- Group: Forest -->
            <div class="legend-group" id="grp-forest">
                <div class="legend-group-header" onclick="toggleGroup('grp-forest')">
                    <span class="group-chevron">▼</span>
                    <span class="group-label">Forest</span>
                </div>
                <div class="legend-group-items">
                    <div class="legend-item inactive" id="item-forest" onclick="toggleLayer('forest')">
                        <div class="legend-swatch line" style="background:#4a9; width:14px; height:2px;"></div>
                        <span class="legend-item-label">Forest Compartments</span>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Coordinates bar -->
    <div id="coords-bar">
        <span id="coords-text">Move cursor over map</span>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.vectorgrid@1.3.0/dist/Leaflet.VectorGrid.bundled.js"></script>
    <script src="https://unpkg.com/@mapbox/leaflet-omnivore@0.3.4/leaflet-omnivore.min.js"></script>
    <script src="https://unpkg.com/leaflet-search@2.9.7/dist/leaflet-search.min.js"></script>

    <script>
        const map = L.map('map', { maxZoom: 22, zoomControl: true })
            .setView([21.25, 81.85], 8);

        L.control.scale({ imperial: false, position: 'bottomleft' }).addTo(map);

        const satellite = L.tileLayer(
            'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
            { maxZoom: 22, maxNativeZoom: 19, attribution: '© Esri' }
        ).addTo(map);

        /* ── Popup builder ── */
        function buildPopup(title, rows) {
            let trs = rows.map(([k, v]) =>
                `<tr><td>${k}</td><td>${v || 'N/A'}</td></tr>`
            ).join('');
            return `<div class="popup-inner">
                <div class="popup-title">${title}</div>
                <table>${trs}</table>
            </div>`;
        }

        /* ── Vector tile style factory ── */
        function vStyle(fillColor) {
            return { fillColor, fill: true, fillOpacity: 0.3, stroke: true, color: fillColor, weight: 0.8 };
        }

        /* ── Major mining ── */
        const majorMining = L.vectorGrid.protobuf(
            "https://indianopenmaps.fly.dev/not-so-open/mining/leases/major/ncog/{z}/{x}/{y}.pbf",
            {
                maxNativeZoom: 10, maxZoom: 22,
                rendererFactory: L.svg.tile,
                vectorTileLayerStyles: {
                    'NCOG_Major_Mining_Leases': {
                        fillColor: '#ffa500',
                        fill: true,
                        fillOpacity: 0.3,
                        stroke: true,
                        color: '#ffa500',
                        weight: 0.1
                    }
                },
                interactive: true,
                getFeatureId: f => f.properties?.id || f.properties?.lease_id || Math.random()
            }
        ).addTo(map);

        majorMining.on('click', e => {
            const p = e.layer?.properties || e.propagatedFrom?.properties || {};
            L.popup({ closeButton: true })
                .setLatLng(e.latlng)
                .setContent(buildPopup(p.mine_name || p.name || 'Major Mine', [
                    ['Mine Code', p.mine_code],
                    ['Lessor', p.name_of_le],
                    ['Area (Ha)', p.area],
                    ['Village', p.vil_name11],
                    ['District', p.district],
                    ['GID', p.gid]
                ])).openOn(map);
        });

        /* ── Minor mining ── */
        const minorMining = L.vectorGrid.protobuf(
            "https://indianopenmaps.fly.dev/not-so-open/mining/leases/minor/ncog/{z}/{x}/{y}.pbf",
            {
                maxNativeZoom: 10, maxZoom: 22,
                rendererFactory: L.svg.tile,
                vectorTileLayerStyles: {
                    'NCOG_Minor_Mining_Leases': {
                        fillColor: '#0000ff',
                        fill: true,
                        fillOpacity: 0.3,
                        stroke: true,
                        color: '#0000ff',
                        weight: 0.1
                    }
                },
                interactive: true,
                getFeatureId: f => f.properties?.id || f.properties?.lease_id || Math.random()
            }
        ).addTo(map);

        minorMining.on('click', e => {
            const p = e.layer?.properties || e.propagatedFrom?.properties || {};
            L.popup({ closeButton: true })
                .setLatLng(e.latlng)
                .setContent(buildPopup(p.mine_name || p.name || 'Minor Mine', [
                    ['Mine Code', p.mine_code],
                    ['Survey No.', p.survey_no],
                    ['GID', p.gid]
                ])).openOn(map);
        });

        /* ── Bhuvan villages ── */
        const bhuvanVillages = L.vectorGrid.protobuf(
            "https://indianopenmaps.com/not-so-open/villages/bhuvan/{z}/{x}/{y}.pbf",
            {
                maxNativeZoom: 10, maxZoom: 22,
                rendererFactory: L.svg.tile,
                vectorTileLayerStyles: {
                    'bhuvan_villages': {
                        fillColor: 'yellow',
                        fill: true,
                        fillOpacity: 0.3,
                        stroke: true,
                        color: 'yellow',
                        weight: 0.1
                    }
                },
                interactive: true,
                getFeatureId: f => f.properties?.id || f.properties?.village_id || Math.random()
            }
        );

        bhuvanVillages.on('click', e => {
            const p = e.layer?.properties || e.propagatedFrom?.properties || {};
            L.popup({ closeButton: true })
                .setLatLng(e.latlng)
                .setContent(buildPopup(p.v_name || 'Village', [
                    ['District', p.d_name]
                ])).openOn(map);
        });

        /* ── KML layers ── */
        const kmlStyle = { color: 'rgba(255,255,255,0.7)', weight: 1.5, fillColor: 'white', fillOpacity: 0.05 };

        function kmlPopup(p, type) {
            if (type === 'main') {
                return buildPopup(p.Facility || 'Dep-04 ML Area', [
                    ['Compartment', p.Compartmen],
                    ['Old Compartment', p.Old_Compar],
                    ['Area (ha)', p.Area_1],
                    ['Forest Type', p.ForestType],
                    ['Division', p.Division],
                    ['Range', p.Range],
                    ['RF', p.RF]
                ]);
            }
            return buildPopup(p.Facility || 'Dep-04 Compartment', [
                ['New Compartment', p.New_compartment_no],
                ['Old Compartment', p.Old_compartment_no],
                ['Area', p.AREA],
                ['Forest Type', p.Forest_Type],
                ['Division', p.Division],
                ['Range', p.Range],
                ['RF', p.RF],
                ['Village', p.Village],
                ['Khasra No.', p.Khasra_no],
                ['Land Type', p.Land_Type]
            ]);
        }

        const kmlLayer = omnivore.kml('data/Dep4MLArea.kml', null, L.geoJson(null, {
            style: () => kmlStyle,
            onEachFeature: (feature, layer) => layer.bindPopup(kmlPopup(feature.properties || {}, 'main'))
        })).addTo(map);

        const kmlLayerCompWise = omnivore.kml(
            'data\\dep4_segments\\4112212521214727y5compartmentwiseandcomponentwiselandbreakupdep4.kml',
            null, L.geoJson(null, {
                style: () => kmlStyle,
                onEachFeature: (feature, layer) => layer.bindPopup(kmlPopup(feature.properties || {}, 'comp'))
            })
        ).addTo(map);

        /* ── WMS layers ── */
        const cgDistrictsWMS = L.tileLayer.wms('https://cfr.atree.org/geoserver/cfr/wms', {
            layers: 'cfr:cg_district_en', format: 'image/png',
            transparent: true, version: '1.3.0', opacity: 0.7
        }).addTo(map);

        const cgVillagesWMS = L.tileLayer.wms('https://cfr.atree.org/geoserver/cfr/wms', {
            layers: 'cfr:cg_village_en', format: 'image/png',
            transparent: true, version: '1.3.0', opacity: 0.6
        });

        const forestCompartments = L.tileLayer.wms('https://cfr.atree.org/geoserver/cfr/wms', {
            layers: 'cfr:cg_forest_compartments', format: 'image/png',
            transparent: true, version: '1.3.0', CRS: 'EPSG:4326', opacity: 0.6
        });

        /* ── Coordinates bar ── */
        map.on('mousemove', e => {
            const lat = e.latlng.lat.toFixed(5);
            const lng = e.latlng.lng.toFixed(5);
            document.getElementById('coords-text').textContent = `${lat}°N  ${lng}°E`;
        });

        /* ── Legend panel toggle ── */
        const legendHeader = document.getElementById('legend-header');
        const legendBody = document.getElementById('legend-body');
        legendHeader.addEventListener('click', () => {
            const collapsed = legendHeader.classList.toggle('collapsed');
            legendBody.style.display = collapsed ? 'none' : 'block';
        });

        /* ── Group collapse ── */
        function toggleGroup(id) {
            const grp = document.getElementById(id);
            const header = grp.querySelector('.legend-group-header');
            const items = grp.querySelector('.legend-group-items');
            const collapsed = header.classList.toggle('collapsed');
            items.style.display = collapsed ? 'none' : 'block';
        }

        /* ── Layer toggle map ── */
        const layerMap = {
            major: majorMining,
            minor: minorMining,
            dep4: kmlLayer,
            dep4c: kmlLayerCompWise,
            dist: cgDistrictsWMS,
            vil: cgVillagesWMS,
            bhuvan: bhuvanVillages,
            forest: forestCompartments
        };

        const activeState = {
            major: true, minor: true, dep4: true, dep4c: true,
            dist: true, vil: false, bhuvan: false, forest: false
        };

        function toggleLayer(key) {
            const layer = layerMap[key];
            if (!layer) return;
            const el = document.getElementById('item-' + key);
            if (activeState[key]) {
                map.removeLayer(layer);
                activeState[key] = false;
                el.classList.add('inactive');
            } else {
                map.addLayer(layer);
                activeState[key] = true;
                el.classList.remove('inactive');
            }
        }

        /* ── Zoom to Deposit 4 ── */
        function zoomToDep4(e) {
            e.stopPropagation();
            const bounds = L.latLngBounds();
            let extended = false;
            [kmlLayer, kmlLayerCompWise].forEach(l => {
                try {
                    const b = l.getBounds();
                    if (b && b.isValid()) { bounds.extend(b); extended = true; }
                } catch (_) { }
            });
            if (extended) {
                map.fitBounds(bounds, { padding: [40, 40] });
            }
        }

        /* Prevent map clicks on legend */
        L.DomEvent.disableClickPropagation(document.getElementById('legend'));
        L.DomEvent.disableScrollPropagation(document.getElementById('legend'));
        L.DomEvent.disableClickPropagation(document.getElementById('map-title'));
    </script>
</body>

</html>
